idea:
  title: LLMs Don't Do Much ToM in Writing
  domain: artificial_intelligence
  hypothesis: One of the reasons LLMs write annoyingly is that they don't seem to
    think of the audience in a vague way. I bet have the model manually simulate the
    audience in its CoT every sentence or so would help a lot.
